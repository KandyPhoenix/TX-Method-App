<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes, maximum-scale=5" />
  <meta name="theme-color" content="#10121b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Texas Method" />
  <title>Texas Method Trainer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">▦</span>
        <div>
          <h1 id="screenTitle">Today</h1>
          <p id="screenSub" class="sub"></p>
          <span class="version-badge">v47 · Jun 15</span>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button id="profileBtn" class="ghost-btn profile-avatar-btn" title="Switch profile">Me</button>
        <button id="rfresh" class="ghost-btn" title="Jump to current day">⟳</button>
      </div>
    </header>

    <main id="view"><!-- screens render here --></main>

    <nav class="tabbar" role="tablist">
      <button class="tab active" data-tab="today"><span>🏋️</span>Today</button>
      <button class="tab" data-tab="program"><span>📅</span>Program</button>
      <button class="tab" data-tab="stats"><span>📈</span>Stats</button>
      <button class="tab" data-tab="setup"><span>⚙️</span>Setup</button>
    </nav>
  </div>

  <!-- Rest timer — centered card overlay -->
  <div id="restTimer" class="rest-overlay hidden">
    <div class="rest-card">
      <div id="restLabel" class="rest-label">REST</div>
      <div id="restDisplay" class="rest-time">2:00</div>
      <div class="rest-bar-track"><div id="restFill" class="rest-bar-fill"></div></div>
      <div class="rest-card-controls">
        <button id="restMinus" class="rest-ctrl">−15</button>
        <button id="restStop" class="rest-stop">Done</button>
        <button id="restPlus" class="rest-ctrl">+15</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
